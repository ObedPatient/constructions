services:
  postgres:
    image: postgres:16-alpine
    container_name: builders-max-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: real
      POSTGRES_PASSWORD: real_password
      POSTGRES_DB: real_construction
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U real -d real_construction"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
